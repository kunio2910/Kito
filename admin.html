<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý nội dung - Truyền Giáo Kitô</title>
    <link rel="stylesheet" href="styles.css?v=20260708-large2" />
  </head>
  <body class="admin-page">
    <header class="site-header admin-header">
      <a class="brand" href="index.html">
        <span class="brand-mark">✝</span>
        <span>Truyền Giáo<br />Kitô</span>
      </a>
      <nav class="main-nav" aria-label="Điều hướng quản trị">
        <a href="index.html">Xem website</a>
        <a href="#contentManager">Nội dung</a>
        <a href="accounts.html">Tài khoản</a>
      </nav>
      <div class="header-actions" id="adminAuthStatus"></div>
    </header>

    <main class="admin-shell">
      <section class="login-panel" id="loginPanel">
        <div>
          <p class="eyebrow">Đăng nhập quản trị</p>
          <h1>Đăng nhập để quản lý nội dung</h1>
        </div>
        <form id="loginForm" class="login-form">
          <label>
            <span>User</span>
            <input id="loginUsername" type="text" autocomplete="username" required />
          </label>
          <label>
            <span>Password</span>
            <input id="loginPassword" type="password" autocomplete="current-password" required />
          </label>
          <button class="primary-button" type="submit">Đăng nhập</button>
          <p class="form-message" id="loginMessage"></p>
        </form>
      </section>

      <div id="adminProtected" hidden>
      <section class="admin-intro">
        <div>
          <p class="eyebrow">Trang quản lý</p>
          <h1>Thêm, sửa, xóa hình ảnh và nội dung truyền giáo</h1>
          <p>Nhập nội dung mới, dán URL ảnh, rồi lưu. Dữ liệu sẽ hiển thị ngay trên trang chủ.</p>
        </div>
      </section>

      <section class="manager-layout" id="contentManager">
        <form class="editor-panel" id="contentForm">
          <input type="hidden" id="itemId" />
          <label>
            <span>Loại nội dung</span>
            <select id="itemType" required>
              <option value="saints">Các thánh</option>
              <option value="churches">Nhà thờ</option>
              <option value="articles">Bài viết</option>
              <option value="events">Sự kiện</option>
              <option value="daily">Lời Chúa mỗi ngày</option>
              <option value="banners">Banner chính</option>
            </select>
          </label>
          <label>
            <span>Tiêu đề</span>
            <input id="itemTitle" type="text" required placeholder="Ví dụ: Thánh Giuse" />
          </label>
          <label>
            <span>Mô tả ngắn</span>
            <textarea id="itemDescription" rows="4" required placeholder="Viết nội dung tóm tắt..."></textarea>
          </label>
          <label>
            <span>Nội dung HTML đầy đủ</span>
            <textarea id="itemBodyHtml" rows="8" placeholder='Ví dụ: <p>Nội dung...</p><img src="https://..." alt="Mô tả ảnh" />'></textarea>
          </label>
          <div class="two-fields">
            <label>
              <span>Thông tin phụ</span>
              <input id="itemMeta" type="text" placeholder="Địa điểm, ngày giờ, câu trích..." />
            </label>
            <label>
              <span>Ngày sự kiện</span>
              <input id="itemDate" type="date" />
            </label>
          </div>
          <label>
            <span>Trạng thái hiển thị</span>
            <select id="itemStatus">
              <option value="actived">Actived - hiển thị</option>
              <option value="unactived">Unactived - ẩn</option>
            </select>
          </label>
          <label>
            <span>URL hình ảnh</span>
            <input id="itemImageUrl" type="url" placeholder="https://..." />
          </label>
          <img class="image-preview" id="imagePreview" alt="Xem trước ảnh" />
          <div class="form-actions">
            <button class="primary-button" type="submit">Lưu nội dung</button>
            <button class="ghost-button" type="button" id="clearForm">Làm mới</button>
            <button class="ghost-button" type="button" id="fillSaints">Tự điền tiểu sử các thánh</button>
          </div>
          <p class="form-message" id="contentMessage"></p>
        </form>

        <section class="table-panel">
          <div class="section-heading">
            <h2>Danh sách nội dung</h2>
            <select id="filterType" aria-label="Lọc loại nội dung">
              <option value="all">Tất cả</option>
              <option value="saints">Các thánh</option>
              <option value="churches">Nhà thờ</option>
              <option value="articles">Bài viết</option>
              <option value="events">Sự kiện</option>
              <option value="daily">Lời Chúa mỗi ngày</option>
              <option value="banners">Banner chính</option>
            </select>
          </div>
          <div class="admin-list" id="adminList"></div>
        </section>
      </section>

      </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="data.js"></script>
    <script src="auth.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
